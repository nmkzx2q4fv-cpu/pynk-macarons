<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Anlässe · Macarons by Pynk</title>
  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="img/Firmenlogo.jpg" />
  <link rel="apple-touch-icon" href="img/Firmenlogo.jpg" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#D81277" />
  <!-- Canonical -->
  <link rel="canonical" href="https://macaronbypynk.de/anlaesse.html" />
  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Macarons by Pynk" />
  <meta property="og:title" content="Anlässe · Macarons by Pynk" />
  <meta property="og:description" content="Finde die perfekte Macaron-Box für deinen Anlass – Hochzeit, Babyparty, Geburtstag oder Firmen-Event. Standard oder Premium, immer handgemacht." />
  <meta property="og:image" content="https://macaronbypynk.de/img/Firmenlogo.jpg" />
  <meta property="og:url" content="https://macaronbypynk.de/anlaesse.html" />
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Anlässe · Macarons by Pynk" />
  <meta name="twitter:description" content="Finde die perfekte Macaron-Box für deinen Anlass – Hochzeit, Babyparty, Geburtstag oder Firmen-Event. Standard oder Premium, immer handgemacht." />
  <meta name="twitter:image" content="https://macaronbypynk.de/img/Firmenlogo.jpg" />
  <meta name="description" content="Finde die perfekte Macaron-Box für deinen Anlass – Hochzeit, Babyparty, Geburtstag oder Firmen-Event. Standard oder Premium, immer handgemacht." />
  <link rel="stylesheet" href="fonts/fonts.css" />
  <link rel="stylesheet" href="styles/m3-tokens.min.css?v=20260626b" />
  <link rel="stylesheet" href="styles/main.min.css?v=20260626b" />
</head>
<body data-page="anlaesse">
  <a class="skip-link" href="#anlass-grid">Zum Anlass-Auswahl springen</a>

  <!-- OCCASION SELECTION -->
  <section class="section anlass-hero" id="anlass-grid">
    <div class="wrap">
      <a href="index.html" class="anlass-back">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Zurück zur Boutique
      </a>
      <div class="section__head reveal" style="text-align:center">
        <p class="eyebrow">Dein perfekter Moment</p>
        <h1 class="display">Für welchen Anlass suchst du?</h1>
        <p class="lead">Wähle deinen Anlass – wir haben die passende Box.</p>
      </div>

      <div class="anlass-grid" id="anlassGrid">
        <button class="anlass-card reveal" data-anlass="hochzeit" type="button">
          <div class="anlass-card__media"><img src="img/hero-tower.jpg" alt="" loading="lazy" /></div>
          <div class="anlass-card__body">
            <h2>Hochzeit</h2>
            <p>Elegante Boxen in Weiß, Gold & Rosé</p>
          </div>
        </button>
        <button class="anlass-card reveal" data-anlass="babyparty" type="button">
          <div class="anlass-card__media"><img src="img/bear-hero.jpg" alt="" loading="lazy" /></div>
          <div class="anlass-card__body">
            <h2>Babyparty & Reveal</h2>
            <p>Zartes Pastell & süße Bärchen</p>
          </div>
        </button>
        <button class="anlass-card reveal" data-anlass="geburtstag" type="button">
          <div class="anlass-card__media"><img src="img/gift-luxe.jpg" alt="" loading="lazy" /></div>
          <div class="anlass-card__body">
            <h2>Geburtstag</h2>
            <p>Bunt, fröhlich, unvergesslich</p>
          </div>
        </button>
        <a class="anlass-card reveal" href="gutschein.html">
          <div class="anlass-card__media"><img src="img/box-open.jpg" alt="" loading="lazy" /></div>
          <div class="anlass-card__body">
            <h2>Gutscheine</h2>
            <p>Süße Momente verschenken</p>
          </div>
        </a>
      </div>
    </div>
  </section>

  <!-- TIERED PRICING DETAIL (hidden until occasion selected) -->
  <section class="section anlass-detail" id="anlassDetail" hidden>
    <div class="wrap">
      <button class="anlass-back" id="anlassBackToGrid" type="button">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Anderen Anlass wählen
      </button>
      <div class="section__head" style="text-align:center">
        <p class="eyebrow" id="detailEyebrow"></p>
        <h2 class="display" id="detailTitle"></h2>
        <p class="lead" id="detailLead"></p>
      </div>

      <!-- Gender choice (babyparty only) -->
      <div class="gender-choice" id="genderChoice" hidden>
        <h3 class="h3" style="text-align:center;margin-bottom:var(--s5)">Wird es ein Junge oder ein Mädchen?</h3>
        <div class="gender-cards">
          <button class="gender-card gender-card--girl" data-gender="girl" type="button">
            <span class="gender-card__emoji">🎀</span>
            <strong>Mädchen</strong>
            <p>Rosa Macarons & Bärchen in Pastell-Pink</p>
          </button>
          <button class="gender-card gender-card--boy" data-gender="boy" type="button">
            <span class="gender-card__emoji">🧸</span>
            <strong>Junge</strong>
            <p>Blaue Macarons & Bärchen in Himmelblau</p>
          </button>
        </div>
      </div>

      <div class="tier-grid" id="tierGrid">
        <!-- tier cards injected by JS -->
      </div>

      <div class="anlass-cta reveal" style="text-align:center;margin-top:var(--s7)">
        <p style="color:var(--bordeaux-2);margin-bottom:var(--s4)">Du möchtest lieber selbst mischen?</p>
        <a href="custom-box.html" class="btn btn--ghost">Box-Atelier öffnen →</a>
      </div>
    </div>
  </section>

  <script src="js/main.min.js?v=20260626b"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js" defer></script>
  <script>
  (function(){
    "use strict";
    const $ = s => document.querySelector(s);
    const $$ = s => [...document.querySelectorAll(s)];

    /* ================================================================
       TIERED PRICING DATA — modular, erweiterbar
       Neue Varianten = neues Objekt in variants[]
       ================================================================ */
    const OCCASIONS = {
      hochzeit: {
        eyebrow: "Hochzeit",
        title: "Eleganz für euren großen Tag",
        lead: "Edle Macarons in Weiß, Gold und Rosé – abgestimmt auf eure Feier. Von der kleinen Candy-Bar bis zum großen Empfang.",
        variants: [
          { id: "hoch-classic-6",  tier: "standard", name: "Classic Hochzeitsbox",  size: 6,  price: 18, desc: "6 Macarons in Weiß & Rosé – Vanille, Erdbeere, Kokos.",      img: "img/gift-luxe.jpg"  },
          { id: "hoch-classic-12", tier: "standard", name: "Classic Hochzeitsbox",  size: 12, price: 34, desc: "12 Macarons in Weiß & Rosé – die beliebte Tischgröße.",      img: "img/gift-luxe.jpg"  },
          { id: "hoch-premium-6",  tier: "premium",  name: "Premium Hochzeitsbox", size: 6,  price: 28, desc: "6 handbemalte Bärchen in Gold & Rosé – jedes ein Unikat.",    img: "img/bear-hero.jpg"  },
          { id: "hoch-premium-12", tier: "premium",  name: "Premium Hochzeitsbox", size: 12, price: 52, desc: "12 handbemalte Bärchen – das Highlight auf jedem Tisch.",     img: "img/bear-hero.jpg"  }
        ]
      },
      babyparty: {
        eyebrow: "Babyparty & Gender Reveal",
        title: "Süße Überraschung in Pastell",
        lead: "Rosa oder Blau? Klassisch oder mit Bärchen? Wähle dein Paket – und verrate das Geheimnis mit Macarons.",
        variants: [
          { id: "baby-girl-std",  tier: "standard", name: "It's a Girl Box",       size: 6, price: 18, desc: "6 rosa Macarons – Erdbeere, Himbeere, Wild Berry.",           img: "img/mac-erdbeere.jpg"  },
          { id: "baby-boy-std",   tier: "standard", name: "It's a Boy Box",        size: 6, price: 18, desc: "6 blaue Macarons – Blaubeer-Cheesecake, Kokos, Lavendel.",    img: "img/mac-cheesecake.jpg" },
          { id: "baby-girl-prem", tier: "premium",  name: "Premium Girl Box",      size: 6, price: 28, desc: "6 handbemalte rosa Bärchen – jedes ein kleines Kunstwerk.",    img: "img/bear-pink.jpg"     },
          { id: "baby-boy-prem",  tier: "premium",  name: "Premium Boy Box",       size: 6, price: 28, desc: "6 handbemalte blaue Bärchen – perfekt zum Verraten.",          img: "img/bear-blue.jpg"     }
        ]
      },
      geburtstag: {
        eyebrow: "Geburtstag",
        title: "Ein Geschenk, das zergeht",
        lead: "Bunt und fröhlich oder edel und klassisch? Geburtstagskinder verdienen beides.",
        variants: [
          { id: "geb-bunt-6",     tier: "standard", name: "Bunte Geburtstagsbox",  size: 6,  price: 18, desc: "6 bunt gemischte Macarons – für den fröhlichen Geburtstag.", img: "img/gift-luxe.jpg"   },
          { id: "geb-bunt-12",    tier: "standard", name: "Bunte Geburtstagsbox",  size: 12, price: 34, desc: "12 bunt gemischte Macarons – Vielfalt pur.",                 img: "img/gift-luxe.jpg"   },
          { id: "geb-deluxe-6",   tier: "premium",  name: "Deluxe Geburtstagsbox", size: 6,  price: 28, desc: "6 handbemalte Bärchen – das besondere Geschenk.",            img: "img/bear-hero.jpg"   },
          { id: "geb-deluxe-12",  tier: "premium",  name: "Deluxe Geburtstagsbox", size: 12, price: 52, desc: "12 handbemalte Bärchen – ein unvergessliches Erlebnis.",      img: "img/bear-hero.jpg"   }
        ]
      }
    };

    let _currentAnlass = null;

    function renderTiers(key, genderFilter) {
      const occ = OCCASIONS[key];
      if (!occ) return;
      _currentAnlass = key;

      $("#detailEyebrow").textContent = occ.eyebrow;
      $("#detailTitle").textContent = occ.title;
      $("#detailLead").textContent = occ.lead;

      const gc = $("#genderChoice");
      const grid = $("#tierGrid");

      if (key === "babyparty" && !genderFilter) {
        gc.hidden = false;
        grid.innerHTML = "";
        $("#detailTitle").textContent = "Verratet ihr es?";
        $("#detailLead").textContent = "Wählt zuerst – wir zeigen euch dann die passenden Pakete in der richtigen Farbe.";
        $("#anlass-grid").hidden = true;
        $("#anlassDetail").hidden = false;
        window.scrollTo({ top: 0, behavior: "smooth" });
        return;
      }

      gc.hidden = true;
      let variants = occ.variants;
      if (genderFilter) {
        variants = variants.filter(v => v.id.includes(genderFilter));
        if (genderFilter === "girl") {
          $("#detailTitle").textContent = "It's a Girl! 🎀";
          $("#detailLead").textContent = "Wunderschöne rosa Macarons und handbemalte Bärchen – zart, süß und voller Liebe.";
        } else {
          $("#detailTitle").textContent = "It's a Boy! 🧸";
          $("#detailLead").textContent = "Himmelblaue Macarons und handbemalte Bärchen – mutig, frisch und zum Verlieben.";
        }
      }

      const standards = variants.filter(v => v.tier === "standard");
      const premiums  = variants.filter(v => v.tier === "premium");

      grid.innerHTML = `
        <div class="tier-section">
          <div class="tier-label">
            <span class="tier-badge tier-badge--std">Standard</span>
            <p>Klassische Macarons – handgemacht & köstlich</p>
          </div>
          <div class="tier-cards">${standards.map(tierCard).join("")}</div>
        </div>
        <div class="tier-section">
          <div class="tier-label">
            <span class="tier-badge tier-badge--prem">Premium</span>
            <p>Handbemalte Bärchen-Macarons – jedes ein Unikat</p>
          </div>
          <div class="tier-cards">${premiums.map(tierCard).join("")}</div>
        </div>`;

      $("#anlass-grid").hidden = true;
      $("#anlassDetail").hidden = false;
      window.scrollTo({ top: 0, behavior: "smooth" });
      if (typeof observeReveals === "function") observeReveals();
    }

    function tierCard(v) {
      return `
        <article class="tier-card reveal">
          <div class="tier-card__media">
            <img src="${v.img}" alt="${v.name}" loading="lazy" />
            ${v.tier === "premium" ? '<span class="tier-card__star">★</span>' : ''}
          </div>
          <div class="tier-card__body">
            <h3>${v.name}</h3>
            <p class="tier-card__size">${v.size} Stück</p>
            <p class="tier-card__desc">${v.desc}</p>
            <div class="tier-card__foot">
              <span class="tier-card__price">${EUR(v.price)}</span>
              <button class="btn btn--primary btn--sm" data-tier-add="${v.id}" data-tier-name="${v.name} (${v.size}er)" data-tier-price="${v.price}" type="button">In den Warenkorb</button>
            </div>
          </div>
        </article>`;
    }

    // Occasion grid click
    $$("[data-anlass]").forEach(btn => btn.addEventListener("click", () => {
      renderTiers(btn.dataset.anlass);
    }));

    // Gender choice click (babyparty)
    $$("[data-gender]").forEach(btn => btn.addEventListener("click", () => {
      renderTiers("babyparty", btn.dataset.gender);
    }));

    // Back to grid (or back to gender choice for babyparty)
    $("#anlassBackToGrid")?.addEventListener("click", () => {
      const gc = $("#genderChoice");
      if (_currentAnlass === "babyparty" && gc && gc.hidden && $("#tierGrid").innerHTML) {
        renderTiers("babyparty");
        return;
      }
      $("#anlass-grid").hidden = false;
      $("#anlassDetail").hidden = true;
      $("#genderChoice").hidden = true;
      $("#tierGrid").innerHTML = "";
      _currentAnlass = null;
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    // Add tier to cart (delegated)
    document.addEventListener("click", e => {
      const btn = e.target.closest("[data-tier-add]");
      if (!btn) return;
      const name = btn.dataset.tierName;
      const price = +btn.dataset.tierPrice;
      addToCart({
        key: "tier-" + btn.dataset.tierAdd,
        name,
        meta: "Anlass-Box",
        price,
        thumb: '<span style="font-size:1.5rem">🎁</span>'
      });
      if (typeof toast === "function") toast(name + " hinzugefügt");
      if (typeof openDrawer === "function") openDrawer();
    });

    // Deep-link: anlaesse.html?anlass=babyparty
    const param = new URLSearchParams(location.search).get("anlass");
    if (param && OCCASIONS[param]) renderTiers(param);
  })();
  </script>
  <script src="js/gsap-premium.min.js?v=20260626b" defer></script>
</body>
</html>
